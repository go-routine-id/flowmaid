name: CI
on:
  push:
    branches: [main]
  pull_request:

jobs:
  test:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: dtolnay/rust-toolchain@stable
        with:
          components: clippy
      - run: cargo test --all-targets
      - run: cargo test --doc
      - run: cargo test --all-targets --features markdown
      - run: cargo clippy --all-targets --features markdown -- -D warnings

  # The crate promises Rust 1.75 compatibility — hold us to it.
  msrv:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: dtolnay/rust-toolchain@1.75
      - run: cargo check --all-targets

  # Pure-std means wasm32 must always stay green.
  wasm:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: dtolnay/rust-toolchain@stable
        with:
          targets: wasm32-unknown-unknown
      - run: cargo check --lib --target wasm32-unknown-unknown
